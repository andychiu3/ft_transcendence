name: AuthPlay Keep Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Runs every hour at minute 0
  workflow_dispatch: # Allows manual triggering of the workflow
jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Keep AuthPlay Backend Alive by pinging the /ping endpoint
        run: |
          curl -f -s -S https://ft-transcendence-rtjp.onrender.com/ping
